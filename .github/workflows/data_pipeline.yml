name: Monthly Data Update Pipeline

on:
  schedule:
    - cron: '0 0 1 * *' # Runs at midnight on the 1st of every month
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install pandas
        
      - name: Run ETL Script
        run: python update_data.py
        
      - name: Commit and Push New Data
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/emigration_trends.csv
          git commit -m "Automated data refresh from pipeline" || exit 0
          git push